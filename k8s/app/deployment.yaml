apiVersion: apps/v1
kind: Deployment
metadata:
  name: deartalk
  namespace: deartalk
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deartalk
  template:
    metadata:
      labels:
        app: deartalk
    spec:
      containers:
        - name: deartalk
          image: iqbal2604/deartalk-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: deartalk-config
            - secretRef:
                name: deartalk-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
      